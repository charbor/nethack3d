<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NetHack 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  overflow: hidden;
  user-select: none;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

/* ── Stair transition flash ── */
#stairFlash {
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  z-index: 999;
  transition: opacity 0.3s ease-out;
}
#stairFlash.active {
  opacity: 1;
  transition: opacity 0.25s ease-in;
}

/* ── Crosshair ── */
#crosshair {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 18px; height: 18px;
  pointer-events: none;
}
#crosshair::before, #crosshair::after {
  content: '';
  position: absolute;
  background: rgba(255,255,255,0.82);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
#crosshair::before { width: 2px; height: 18px; }
#crosshair::after  { width: 18px; height: 2px; }

/* ── Status bar ── */
#status {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.65);
  color: #bbb;
  font: 13px/30px 'Courier New', monospace;
  padding: 0 16px;
  letter-spacing: 1px;
  pointer-events: none;
}
#status .hi { color: #f80; }

/* ── Overlays ── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  z-index: 10;
}

#overlay {
  background: rgba(0,0,0,0.92);
  color: #ccc;
}
#overlay h1 {
  font-size: 58px;
  color: #f80;
  text-shadow: 0 0 28px #f60, 0 0 56px #f40;
  letter-spacing: 6px;
  margin-bottom: 6px;
}
.subtitle {
  color: #555;
  font-size: 13px;
  letter-spacing: 4px;
  margin-bottom: 38px;
}
.ctrls { margin-bottom: 38px; line-height: 2.2; font-size: 14px; text-align: center; }
.ctrls .k { color: #f80; font-weight: bold; }
#startBtn {
  padding: 13px 46px;
  background: #f80; color: #000;
  border: none;
  font: bold 17px 'Courier New', monospace;
  letter-spacing: 3px;
  cursor: pointer;
}
#startBtn:hover { background: #fa0; }

#paused {
  background: rgba(0,0,0,0.78);
  color: #f80;
  font-size: 28px;
  letter-spacing: 4px;
  display: none;
}

/* ── Character creation screen ── */
#charscreen {
  background: rgba(0,0,0,0.96);
  display: none;
  color: #bbb;
  font-family: 'Courier New', monospace;
}
#charscreen .cs-wrap {
  width: min(520px, 96vw);
}
#charscreen h2 {
  font-size: 22px;
  color: #f80;
  letter-spacing: 4px;
  margin-bottom: 6px;
  text-align: center;
}
#charscreen .cs-progress {
  text-align: center;
  font-size: 11px;
  letter-spacing: 2px;
  color: #555;
  margin-bottom: 22px;
}
#charscreen .cs-progress .cur { color: #f80; }
#charscreen .cs-label {
  font-size: 12px;
  color: #666;
  letter-spacing: 2px;
  margin-bottom: 8px;
  text-transform: uppercase;
}
/* name input */
#charscreen #nameInput {
  background: #000;
  border: 1px solid #444;
  color: #f80;
  font: 20px 'Courier New', monospace;
  padding: 8px 12px;
  width: 100%;
  outline: none;
  letter-spacing: 2px;
  caret-color: #f80;
  margin-bottom: 6px;
}
#charscreen #nameInput:focus { border-color: #f80; }
/* option list */
#charscreen .opt-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 8px;
  max-height: 55vh;
  overflow-y: auto;
}
#charscreen .opt {
  padding: 9px 14px;
  border: 1px solid #2a2a2a;
  cursor: pointer;
  display: flex;
  align-items: baseline;
  gap: 12px;
  transition: border-color 0.1s;
}
#charscreen .opt:hover { border-color: #555; background: rgba(255,136,0,0.06); }
#charscreen .opt.selected {
  border-color: #f80;
  background: rgba(255,136,0,0.12);
  color: #fff;
}
#charscreen .opt .glyph {
  color: #f80;
  width: 14px;
  flex-shrink: 0;
  font-size: 13px;
}
#charscreen .opt .oname {
  color: #ddd;
  font-size: 15px;
  font-weight: bold;
  min-width: 90px;
}
#charscreen .opt .odesc { color: #666; font-size: 12px; }
#charscreen .opt .ostatline {
  margin-left: auto;
  font-size: 11px;
  color: #555;
  white-space: nowrap;
}
/* summary stats */
#charscreen .stat-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
  margin-bottom: 14px;
  text-align: center;
}
#charscreen .stat-cell .sname { font-size: 10px; color: #555; letter-spacing: 1px; }
#charscreen .stat-cell .sval  { font-size: 18px; color: #f80; font-weight: bold; }
#charscreen .summary-line {
  font-size: 13px;
  color: #888;
  margin-bottom: 4px;
}
#charscreen .summary-line span { color: #f80; }
/* nav buttons */
#charscreen .cs-nav {
  display: flex;
  justify-content: space-between;
  margin-top: 18px;
  gap: 12px;
}
#charscreen .cs-nav button {
  flex: 1;
  padding: 10px;
  background: #111;
  color: #888;
  border: 1px solid #333;
  font: 14px 'Courier New', monospace;
  letter-spacing: 2px;
  cursor: pointer;
}
#charscreen .cs-nav button:hover { border-color: #888; color: #ccc; }
#charscreen .cs-nav button.primary {
  background: #f80;
  color: #000;
  border-color: #f80;
  font-weight: bold;
}
#charscreen .cs-nav button.primary:hover { background: #fa0; }
#charscreen .cs-nav button:disabled { opacity: 0.3; cursor: default; }

/* ── Inventory overlay ── */
#inventory {
  background: rgba(0,0,0,0.92);
  display: none;
  color: #bbb;
}
#inventory .inv-wrap {
  width: min(540px, 94vw);
  max-height: 85vh;
  overflow-y: auto;
}
#inventory h2 {
  font-size: 18px;
  color: #f80;
  letter-spacing: 3px;
  text-align: center;
  margin-bottom: 14px;
}
#inventory .inv-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
  padding: 4px;
}
#inventory .inv-tile {
  position: relative;
  background: #1a1a1a;
  border: 2px solid #333;
  border-radius: 4px;
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: default;
  transition: border-color 0.12s;
}
#inventory .inv-tile:hover {
  border-color: #f80;
  background: #221a10;
}
#inventory .inv-tile canvas {
  image-rendering: pixelated;
  width: 40px; height: 40px;
}
#inventory .inv-tile .slot-letter {
  position: absolute;
  top: 2px; left: 5px;
  font-size: 10px;
  color: #666;
}
#inventory .inv-tile .item-name {
  font-size: 9px;
  color: #888;
  text-align: center;
  margin-top: 2px;
  line-height: 1.1;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 0 2px;
}
#inventory .inv-cat-header {
  grid-column: 1 / -1;
  color: #f80;
  font-size: 12px;
  letter-spacing: 2px;
  padding: 8px 0 2px;
  border-bottom: 1px solid #2a2a2a;
}
#inventory .inv-cat-header:first-child { padding-top: 0; }
#inventory .inv-tile.selected {
  border-color: #f80;
  background: #2a1a08;
}
#inventory .inv-tile.equipped {
  border-color: #4a4;
}
#inventory .inv-tile.equipped.selected {
  border-color: #f80;
}
#inventory .inv-tile .equip-badge {
  position: absolute;
  top: 2px; right: 4px;
  font-size: 9px;
  color: #4f4;
  font-weight: bold;
}
/* Action bar */
#inventory .inv-actions {
  margin-top: 10px;
  padding: 10px 12px;
  background: #151515;
  border: 1px solid #333;
  border-radius: 4px;
  display: none;
}
#inventory .inv-actions .act-name {
  color: #f80;
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 4px;
}
#inventory .inv-actions .act-stat {
  color: #888;
  font-size: 11px;
  margin-bottom: 8px;
}
#inventory .inv-actions .act-btns {
  display: flex;
  gap: 8px;
}
#inventory .inv-actions .act-btn {
  padding: 6px 16px;
  font: bold 12px 'Courier New', monospace;
  letter-spacing: 1px;
  border: 1px solid #444;
  background: #1a1a1a;
  color: #ccc;
  cursor: pointer;
}
#inventory .inv-actions .act-btn:hover {
  border-color: #f80;
  color: #fff;
}
#inventory .inv-actions .act-btn.use {
  border-color: #4a4;
  color: #8f8;
}
#inventory .inv-actions .act-btn.use:hover {
  border-color: #6f6;
  background: #0a1a0a;
}
#inventory .inv-actions .act-btn.drop {
  border-color: #633;
  color: #a66;
}
#inventory .inv-actions .act-btn.drop:hover {
  border-color: #f44;
  color: #f88;
}
#inventory .inv-hint {
  text-align: center;
  color: #444;
  font-size: 11px;
  margin-top: 14px;
  letter-spacing: 1px;
}
#inventory .inv-empty {
  text-align: center;
  color: #555;
  font-size: 14px;
  margin-top: 20px;
}
/* ── Message line ── */
#msg {
  position: fixed;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  color: #f80;
  font: 14px 'Courier New', monospace;
  text-shadow: 0 0 8px rgba(255,136,0,0.4);
  pointer-events: none;
  z-index: 20;
  opacity: 0;
  transition: opacity 0.4s;
  text-align: center;
  max-width: 80vw;
}

/* fallback mouse-capture hint */
#hint {
  display: none;
  position: fixed;
  top: 54%; left: 50%;
  transform: translateX(-50%);
  color: rgba(255, 180, 50, 0.7);
  font: 12px/1 'Courier New', monospace;
  letter-spacing: 1px;
  pointer-events: none;
  z-index: 2;
}

/* ── Death screen ── */
#deathscreen {
  background: rgba(30,0,0,0.95);
  display: none;
  color: #f44;
}
#deathscreen h1 {
  font-size: 48px;
  color: #f44;
  text-shadow: 0 0 28px #a00, 0 0 56px #600;
  letter-spacing: 6px;
  margin-bottom: 16px;
}
#deathscreen .death-msg {
  color: #a88;
  font-size: 14px;
  margin-bottom: 8px;
}
#deathscreen .death-score {
  color: #866;
  font-size: 13px;
  letter-spacing: 2px;
  margin-bottom: 32px;
}
#deathscreen button {
  padding: 13px 46px;
  background: #a33; color: #fff;
  border: none;
  font: bold 17px 'Courier New', monospace;
  letter-spacing: 3px;
  cursor: pointer;
}
#deathscreen button:hover { background: #c44; }


/* vignette */
#vignette {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
  pointer-events: none;
  z-index: 1;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="stairFlash"></div>
<div id="msg"></div>
<div id="crosshair"></div>
<div id="vignette"></div>
<div id="status"><span id="statusText">&nbsp;</span></div>

<div id="overlay" class="screen">
  <h1>NETHACK 3D</h1>
  <p class="subtitle">▼ &nbsp; A DUNGEON AWAITS &nbsp; ▼</p>
  <div class="ctrls">
    <div><span class="k">W A S D</span> &nbsp;—&nbsp; Move</div>
    <div><span class="k">Mouse</span> &nbsp;—&nbsp; Look around</div>
    <div><span class="k">Shift</span> &nbsp;—&nbsp; Run</div>
    <div><span class="k">Click</span> &nbsp;—&nbsp; Attack</div>
    <div><span class="k">I</span> &nbsp;—&nbsp; Inventory</div>
    <div><span class="k">Esc</span> &nbsp;—&nbsp; Release mouse</div>
  </div>
  <button id="startBtn">DESCEND INTO DARKNESS</button>
</div>

<div id="paused" class="screen">— PAUSED — &nbsp; (click to resume)</div>
<div id="hint"></div>

<div id="charscreen" class="screen">
  <div class="cs-wrap">
    <h2>CHARACTER CREATION</h2>
    <div class="cs-progress" id="csProg"></div>
    <div id="csBody"></div>
    <div class="cs-nav">
      <button id="csBack">◀ BACK</button>
      <button id="csNext" class="primary">NEXT ▶</button>
    </div>
  </div>
</div>

<div id="inventory" class="screen">
  <div class="inv-wrap" id="invBody"></div>
</div>


<div id="deathscreen" class="screen">
  <h1>YOU DIED</h1>
  <div class="death-msg"></div>
  <div class="death-score"></div>
  <button onclick="location.reload()">TRY AGAIN</button>
</div>

<!-- Three.js r128 global build -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ── Dream sequence intro — divine light vision ── */
window._showDreamIntro = function(ch, onDone) {
  var LORE = {
    Warrior:  'to seek glory in the depths below, blade in hand and courage in heart',
    Valkyrie: 'to descend into the abyss and prove your worth to the gods of battle',
    Rogue:    'to slip into the dungeon unseen and claim its treasures for yourself',
    Ranger:   'to venture into the unknown wilds beneath the earth',
    Wizard:   'to plumb the arcane secrets buried in the darkness below',
    Healer:   'to brave the dungeon and bring light where only death resides'
  };
  var ADJ  = { Lawful:'righteous', Neutral:'pragmatic', Chaotic:'unpredictable' };
  var GOD  = { Lawful:'Mitra',     Neutral:'Crom',      Chaotic:'Set' };
  var HUE  = { Lawful:'210,230,255', Neutral:'255,220,160', Chaotic:'200,140,255' };
  var GHUE = { Lawful:'180,210,255', Neutral:'255,200,100', Chaotic:'180,100,255' };

  var align = ch.align || 'Neutral';
  var name  = ch.name  || 'Hack';
  var race  = ch.race  || 'Human';
  var role  = ch.role  || 'Warrior';
  var wpn   = (ch.equipped && ch.equipped.weapon)
    ? ch.equipped.weapon.item.name.replace(/^an?\s+/, '') : 'bare fists';
  var lore = LORE[role] || 'to explore the dungeon';
  var adj  = ADJ[align] || 'determined';
  var god  = GOD[align] || 'the Gods';
  var hue  = HUE[align] || '255,220,160';
  var ghue = GHUE[align] || '255,200,100';

  /* Inject stylesheet */
  var css = document.createElement('style');
  css.id = 'dreamCSS';
  css.textContent =
    '#dream{position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;' +
    'background:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;' +
    'flex-direction:column;font-family:"Courier New",monospace;overflow:hidden}' +

    /* Main divine glow — large, bright, pulsing */
    '#dream .glow{position:absolute;top:-30%;left:50%;transform:translateX(-50%);' +
    'width:600px;height:700px;border-radius:50%;' +
    'background:radial-gradient(ellipse at 50% 40%,' +
    'rgba('+ghue+',0.35) 0%,rgba('+hue+',0.12) 25%,rgba('+hue+',0.04) 45%,transparent 70%);' +
    'animation:dPulse 3.5s ease-in-out infinite;pointer-events:none}' +

    /* Inner bright core */
    '#dream .core{position:absolute;top:-8%;left:50%;transform:translateX(-50%);' +
    'width:80px;height:80px;border-radius:50%;' +
    'background:radial-gradient(circle,rgba('+ghue+',0.6) 0%,rgba('+hue+',0.15) 40%,transparent 70%);' +
    'animation:dCore 2.5s ease-in-out infinite;pointer-events:none;' +
    'box-shadow:0 0 60px 20px rgba('+hue+',0.15),0 0 120px 40px rgba('+hue+',0.06)}' +

    /* God rays — wider, more dramatic */
    '#dream .ray{position:absolute;top:-8%;left:50%;height:65vh;' +
    'background:linear-gradient(to bottom,rgba('+hue+',0.5),rgba('+hue+',0.12) 40%,rgba('+hue+',0.02) 70%,transparent);' +
    'animation:dRay 2.2s ease-in-out infinite;pointer-events:none;transform-origin:top center}' +
    '#dream .ray.a{width:3px;transform:translateX(-50%) rotate(-12deg);animation-delay:.2s;opacity:.6}' +
    '#dream .ray.b{width:4px;transform:translateX(-50%) rotate(-4deg);opacity:.8}' +
    '#dream .ray.c{width:3px;transform:translateX(-50%) rotate(3deg);animation-delay:.5s;opacity:.7}' +
    '#dream .ray.d{width:2px;transform:translateX(-50%) rotate(10deg);animation-delay:.9s;opacity:.5}' +
    '#dream .ray.e{width:2px;transform:translateX(-50%) rotate(-8deg);animation-delay:1.3s;opacity:.4}' +
    '#dream .ray.f{width:3px;transform:translateX(-50%) rotate(7deg);animation-delay:1.7s;opacity:.55}' +

    /* Motes — floating particles rising toward the light */
    '#dream .motes{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden}' +
    '#dream .mote{position:absolute;border-radius:50%;background:rgba('+hue+',0.6);' +
    'animation:dFloat linear infinite;pointer-events:none}' +

    /* Vignette — heavy, dramatic */
    '#dream .vig{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;' +
    'background:radial-gradient(ellipse at 50% 35%,transparent 30%,rgba(0,0,0,0.5) 60%,#000 100%)}' +

    /* Ground fog */
    '#dream .fog{position:absolute;bottom:0;left:0;right:0;height:25vh;pointer-events:none;' +
    'background:linear-gradient(to top,rgba('+hue+',0.04),transparent);' +
    'animation:dFog 5s ease-in-out infinite}' +

    /* God name — bigger, glowing */
    '#dream .gname{position:relative;z-index:2;' +
    'font-size:16px;letter-spacing:10px;text-transform:uppercase;margin-bottom:4px;' +
    'color:rgba('+hue+',0.9);text-shadow:0 0 20px rgba('+hue+',0.5),0 0 40px rgba('+hue+',0.2);' +
    'opacity:0;animation:dIn 2.5s .3s forwards}' +

    /* Divider line */
    '#dream .divider{position:relative;z-index:2;width:120px;height:1px;margin:10px auto 14px;' +
    'background:linear-gradient(to right,transparent,rgba('+hue+',0.4),transparent);' +
    'opacity:0;animation:dIn 2s .6s forwards}' +

    /* Book line */
    '#dream .book{position:relative;z-index:2;color:#666;font-size:10px;' +
    'letter-spacing:4px;text-transform:uppercase;margin-bottom:28px;' +
    'opacity:0;animation:dIn 2s 1s forwards}' +

    /* Main text — slightly larger, better spacing */
    '#dream .txt{position:relative;z-index:2;max-width:540px;width:90vw;text-align:center;' +
    'font-size:15px;line-height:2.3;color:#aaa;opacity:0;animation:dIn 2.5s 1.6s forwards}' +
    '#dream .txt .hi{color:#f80;text-shadow:0 0 8px rgba(255,136,0,0.3)}' +
    '#dream .txt .al{color:rgba('+hue+',0.95);text-shadow:0 0 8px rgba('+hue+',0.3)}' +

    /* Final dramatic line */
    '#dream .final{position:relative;z-index:2;margin-top:20px;' +
    'font-size:13px;color:#777;font-style:italic;letter-spacing:1px;' +
    'opacity:0;animation:dIn 2s 3s forwards}' +

    /* Dismiss hint */
    '#dream .hint{position:relative;z-index:2;color:#444;font-size:10px;' +
    'letter-spacing:2px;margin-top:34px;opacity:0;animation:dBlink 1.6s 4s ease-in-out infinite}' +

    /* Stars — twinkling */
    '#dream .stars{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}' +
    '#dream .s{position:absolute;border-radius:50%;background:rgba('+hue+',0.5);' +
    'animation:dTwinkle ease-in-out infinite}' +

    /* Keyframes */
    '@keyframes dPulse{0%,100%{opacity:.6;transform:translateX(-50%) scale(1)}' +
    '50%{opacity:1;transform:translateX(-50%) scale(1.08)}}' +
    '@keyframes dCore{0%,100%{opacity:.5;transform:translateX(-50%) scale(1)}' +
    '50%{opacity:1;transform:translateX(-50%) scale(1.2)}}' +
    '@keyframes dRay{0%,100%{opacity:.3}50%{opacity:1}}' +
    '@keyframes dIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}' +
    '@keyframes dBlink{0%,100%{opacity:0}30%,70%{opacity:.7}}' +
    '@keyframes dFloat{0%{transform:translateY(0) scale(1);opacity:0}' +
    '10%{opacity:.7}90%{opacity:.3}100%{transform:translateY(-100vh) scale(0.3);opacity:0}}' +
    '@keyframes dTwinkle{0%,100%{opacity:.15}50%{opacity:.7}}' +
    '@keyframes dFog{0%,100%{opacity:.5}50%{opacity:1}}';
  document.head.appendChild(css);

  /* Build overlay */
  var el = document.createElement('div');
  el.id = 'dream';
  el.innerHTML =
    '<div class="stars"></div>' +
    '<div class="motes"></div>' +
    '<div class="glow"></div>' +
    '<div class="core"></div>' +
    '<div class="ray a"></div><div class="ray b"></div>' +
    '<div class="ray c"></div><div class="ray d"></div>' +
    '<div class="ray e"></div><div class="ray f"></div>' +
    '<div class="fog"></div>' +
    '<div class="vig"></div>' +
    '<div class="gname">' + god + '</div>' +
    '<div class="divider"></div>' +
    '<div class="book">It is written in the Book of the Dead</div>' +
    '<div class="txt">' +
      'In the year of shadows, the <span class="al">' + adj + '</span> ' +
      '<span class="hi">' + race + '</span> known as <span class="hi">' + name + '</span> ' +
      'set forth ' + lore + '.<br><br>' +
      'Armed with a <span class="hi">' + wpn + '</span> and the resolve of a true ' +
      '<span class="hi">' + role + '</span>, you descend the crumbling stairs ' +
      'into the dungeon of doom.' +
    '</div>' +
    '<div class="final">The air grows cold. The torches flicker. Something stirs in the dark.</div>' +
    '<div class="hint">\u2014 click or press any key \u2014</div>';

  /* Stars — twinkling */
  var stars = el.querySelector('.stars');
  for (var i = 0; i < 80; i++) {
    var dot = document.createElement('div');
    dot.className = 's';
    var sz = Math.random() < .15 ? 2 : 1;
    var dur = 2 + Math.random() * 4;
    dot.style.cssText = 'left:'+Math.random()*100+'%;top:'+Math.random()*85+'%;' +
      'width:'+sz+'px;height:'+sz+'px;animation-duration:'+dur+'s;animation-delay:'+Math.random()*dur+'s';
    stars.appendChild(dot);
  }

  /* Rising motes — glowing particles drifting upward */
  var motes = el.querySelector('.motes');
  for (var j = 0; j < 20; j++) {
    var m = document.createElement('div');
    m.className = 'mote';
    var msz = 1 + Math.random() * 2;
    var mdur = 6 + Math.random() * 8;
    m.style.cssText = 'left:'+(30+Math.random()*40)+'%;bottom:-5%;' +
      'width:'+msz+'px;height:'+msz+'px;' +
      'animation-duration:'+mdur+'s;animation-delay:'+Math.random()*mdur+'s';
    motes.appendChild(m);
  }

  document.body.appendChild(el);

  /* Dismiss after delay */
  var ready = false;
  setTimeout(function() {
    ready = true;
    el.addEventListener('click', go);
    document.addEventListener('keydown', go);
  }, 600);

  function go() {
    if (!ready) return;
    ready = false;
    el.removeEventListener('click', go);
    document.removeEventListener('keydown', go);
    el.style.transition = 'opacity 1s';
    el.style.opacity = '0';
    setTimeout(function() {
      el.remove();
      var s = document.getElementById('dreamCSS');
      if (s) s.remove();
      onDone();
    }, 1000);
  }
};
</script>
<script type="module" src="js/main.js"></script>

</body>
</html>
