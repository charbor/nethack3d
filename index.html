<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NetHack 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  overflow: hidden;
  user-select: none;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

/* ── Stair transition flash ── */
#stairFlash {
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  z-index: 999;
  transition: opacity 0.3s ease-out;
}
#stairFlash.active {
  opacity: 1;
  transition: opacity 0.25s ease-in;
}

/* ── Crosshair ── */
#crosshair {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 18px; height: 18px;
  pointer-events: none;
}
#crosshair::before, #crosshair::after {
  content: '';
  position: absolute;
  background: rgba(255,255,255,0.82);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
#crosshair::before { width: 2px; height: 18px; }
#crosshair::after  { width: 18px; height: 2px; }

/* ── Status bar ── */
#status {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.65);
  color: #bbb;
  font: 13px/30px 'Courier New', monospace;
  padding: 0 16px;
  letter-spacing: 1px;
  pointer-events: none;
}
#status .hi { color: #f80; }

/* ── Overlays ── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  z-index: 10;
}

#overlay {
  background: rgba(0,0,0,0.92);
  color: #ccc;
}
#overlay h1 {
  font-size: 58px;
  color: #f80;
  text-shadow: 0 0 28px #f60, 0 0 56px #f40;
  letter-spacing: 6px;
  margin-bottom: 6px;
}
.subtitle {
  color: #555;
  font-size: 13px;
  letter-spacing: 4px;
  margin-bottom: 38px;
}
.ctrls { margin-bottom: 38px; line-height: 2.2; font-size: 14px; text-align: center; }
.ctrls .k { color: #f80; font-weight: bold; }
#startBtn {
  padding: 13px 46px;
  background: #f80; color: #000;
  border: none;
  font: bold 17px 'Courier New', monospace;
  letter-spacing: 3px;
  cursor: pointer;
}
#startBtn:hover { background: #fa0; }

#paused {
  background: rgba(0,0,0,0.78);
  color: #f80;
  font-size: 28px;
  letter-spacing: 4px;
  display: none;
}

/* ── Character creation screen ── */
#charscreen {
  background: rgba(0,0,0,0.96);
  display: none;
  color: #bbb;
  font-family: 'Courier New', monospace;
}
#charscreen .cs-wrap {
  width: min(520px, 96vw);
}
#charscreen h2 {
  font-size: 22px;
  color: #f80;
  letter-spacing: 4px;
  margin-bottom: 6px;
  text-align: center;
}
#charscreen .cs-progress {
  text-align: center;
  font-size: 11px;
  letter-spacing: 2px;
  color: #555;
  margin-bottom: 22px;
}
#charscreen .cs-progress .cur { color: #f80; }
#charscreen .cs-label {
  font-size: 12px;
  color: #666;
  letter-spacing: 2px;
  margin-bottom: 8px;
  text-transform: uppercase;
}
/* name input */
#charscreen #nameInput {
  background: #000;
  border: 1px solid #444;
  color: #f80;
  font: 20px 'Courier New', monospace;
  padding: 8px 12px;
  width: 100%;
  outline: none;
  letter-spacing: 2px;
  caret-color: #f80;
  margin-bottom: 6px;
}
#charscreen #nameInput:focus { border-color: #f80; }
/* option list */
#charscreen .opt-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 8px;
  max-height: 55vh;
  overflow-y: auto;
}
#charscreen .opt {
  padding: 9px 14px;
  border: 1px solid #2a2a2a;
  cursor: pointer;
  display: flex;
  align-items: baseline;
  gap: 12px;
  transition: border-color 0.1s;
}
#charscreen .opt:hover { border-color: #555; background: rgba(255,136,0,0.06); }
#charscreen .opt.selected {
  border-color: #f80;
  background: rgba(255,136,0,0.12);
  color: #fff;
}
#charscreen .opt .glyph {
  color: #f80;
  width: 14px;
  flex-shrink: 0;
  font-size: 13px;
}
#charscreen .opt .oname {
  color: #ddd;
  font-size: 15px;
  font-weight: bold;
  min-width: 90px;
}
#charscreen .opt .odesc { color: #666; font-size: 12px; }
#charscreen .opt .ostatline {
  margin-left: auto;
  font-size: 11px;
  color: #555;
  white-space: nowrap;
}
/* summary stats */
#charscreen .stat-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
  margin-bottom: 14px;
  text-align: center;
}
#charscreen .stat-cell .sname { font-size: 10px; color: #555; letter-spacing: 1px; }
#charscreen .stat-cell .sval  { font-size: 18px; color: #f80; font-weight: bold; }
#charscreen .summary-line {
  font-size: 13px;
  color: #888;
  margin-bottom: 4px;
}
#charscreen .summary-line span { color: #f80; }
/* nav buttons */
#charscreen .cs-nav {
  display: flex;
  justify-content: space-between;
  margin-top: 18px;
  gap: 12px;
}
#charscreen .cs-nav button {
  flex: 1;
  padding: 10px;
  background: #111;
  color: #888;
  border: 1px solid #333;
  font: 14px 'Courier New', monospace;
  letter-spacing: 2px;
  cursor: pointer;
}
#charscreen .cs-nav button:hover { border-color: #888; color: #ccc; }
#charscreen .cs-nav button.primary {
  background: #f80;
  color: #000;
  border-color: #f80;
  font-weight: bold;
}
#charscreen .cs-nav button.primary:hover { background: #fa0; }
#charscreen .cs-nav button:disabled { opacity: 0.3; cursor: default; }

/* ── Inventory overlay ── */
#inventory {
  background: rgba(0,0,0,0.92);
  display: none;
  color: #bbb;
}
#inventory .inv-wrap {
  width: min(540px, 94vw);
  max-height: 85vh;
  overflow-y: auto;
}
#inventory h2 {
  font-size: 18px;
  color: #f80;
  letter-spacing: 3px;
  text-align: center;
  margin-bottom: 14px;
}
#inventory .inv-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
  padding: 4px;
}
#inventory .inv-tile {
  position: relative;
  background: #1a1a1a;
  border: 2px solid #333;
  border-radius: 4px;
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: default;
  transition: border-color 0.12s;
}
#inventory .inv-tile:hover {
  border-color: #f80;
  background: #221a10;
}
#inventory .inv-tile canvas {
  image-rendering: pixelated;
  width: 40px; height: 40px;
}
#inventory .inv-tile .slot-letter {
  position: absolute;
  top: 2px; left: 5px;
  font-size: 10px;
  color: #666;
}
#inventory .inv-tile .item-name {
  font-size: 9px;
  color: #888;
  text-align: center;
  margin-top: 2px;
  line-height: 1.1;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 0 2px;
}
#inventory .inv-cat-header {
  grid-column: 1 / -1;
  color: #f80;
  font-size: 12px;
  letter-spacing: 2px;
  padding: 8px 0 2px;
  border-bottom: 1px solid #2a2a2a;
}
#inventory .inv-cat-header:first-child { padding-top: 0; }
#inventory .inv-tile.selected {
  border-color: #f80;
  background: #2a1a08;
}
#inventory .inv-tile.equipped {
  border-color: #4a4;
}
#inventory .inv-tile.equipped.selected {
  border-color: #f80;
}
#inventory .inv-tile .equip-badge {
  position: absolute;
  top: 2px; right: 4px;
  font-size: 9px;
  color: #4f4;
  font-weight: bold;
}
/* Action bar */
#inventory .inv-actions {
  margin-top: 10px;
  padding: 10px 12px;
  background: #151515;
  border: 1px solid #333;
  border-radius: 4px;
  display: none;
}
#inventory .inv-actions .act-name {
  color: #f80;
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 4px;
}
#inventory .inv-actions .act-stat {
  color: #888;
  font-size: 11px;
  margin-bottom: 8px;
}
#inventory .inv-actions .act-btns {
  display: flex;
  gap: 8px;
}
#inventory .inv-actions .act-btn {
  padding: 6px 16px;
  font: bold 12px 'Courier New', monospace;
  letter-spacing: 1px;
  border: 1px solid #444;
  background: #1a1a1a;
  color: #ccc;
  cursor: pointer;
}
#inventory .inv-actions .act-btn:hover {
  border-color: #f80;
  color: #fff;
}
#inventory .inv-actions .act-btn.use {
  border-color: #4a4;
  color: #8f8;
}
#inventory .inv-actions .act-btn.use:hover {
  border-color: #6f6;
  background: #0a1a0a;
}
#inventory .inv-actions .act-btn.drop {
  border-color: #633;
  color: #a66;
}
#inventory .inv-actions .act-btn.drop:hover {
  border-color: #f44;
  color: #f88;
}
#inventory .inv-hint {
  text-align: center;
  color: #444;
  font-size: 11px;
  margin-top: 14px;
  letter-spacing: 1px;
}
#inventory .inv-empty {
  text-align: center;
  color: #555;
  font-size: 14px;
  margin-top: 20px;
}
/* ── Message line ── */
#msg {
  position: fixed;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  color: #f80;
  font: 14px 'Courier New', monospace;
  text-shadow: 0 0 8px rgba(255,136,0,0.4);
  pointer-events: none;
  z-index: 20;
  opacity: 0;
  transition: opacity 0.4s;
  text-align: center;
  max-width: 80vw;
}

/* fallback mouse-capture hint */
#hint {
  display: none;
  position: fixed;
  top: 54%; left: 50%;
  transform: translateX(-50%);
  color: rgba(255, 180, 50, 0.7);
  font: 12px/1 'Courier New', monospace;
  letter-spacing: 1px;
  pointer-events: none;
  z-index: 2;
}

/* ── Death screen ── */
#deathscreen {
  background: rgba(30,0,0,0.95);
  display: none;
  color: #f44;
}
#deathscreen h1 {
  font-size: 48px;
  color: #f44;
  text-shadow: 0 0 28px #a00, 0 0 56px #600;
  letter-spacing: 6px;
  margin-bottom: 16px;
}
#deathscreen .death-msg {
  color: #a88;
  font-size: 14px;
  margin-bottom: 8px;
}
#deathscreen .death-score {
  color: #866;
  font-size: 13px;
  letter-spacing: 2px;
  margin-bottom: 32px;
}
#deathscreen button {
  padding: 13px 46px;
  background: #a33; color: #fff;
  border: none;
  font: bold 17px 'Courier New', monospace;
  letter-spacing: 3px;
  cursor: pointer;
}
#deathscreen button:hover { background: #c44; }

/* vignette */
#vignette {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
  pointer-events: none;
  z-index: 1;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="stairFlash"></div>
<div id="msg"></div>
<div id="crosshair"></div>
<div id="vignette"></div>
<div id="status"><span id="statusText">&nbsp;</span></div>

<div id="overlay" class="screen">
  <h1>NETHACK 3D</h1>
  <p class="subtitle">▼ &nbsp; A DUNGEON AWAITS &nbsp; ▼</p>
  <div class="ctrls">
    <div><span class="k">W A S D</span> &nbsp;—&nbsp; Move</div>
    <div><span class="k">Mouse</span> &nbsp;—&nbsp; Look around</div>
    <div><span class="k">Shift</span> &nbsp;—&nbsp; Run</div>
    <div><span class="k">Click</span> &nbsp;—&nbsp; Attack</div>
    <div><span class="k">I</span> &nbsp;—&nbsp; Inventory</div>
    <div><span class="k">Esc</span> &nbsp;—&nbsp; Release mouse</div>
  </div>
  <button id="startBtn">DESCEND INTO DARKNESS</button>
</div>

<div id="paused" class="screen">— PAUSED — &nbsp; (click to resume)</div>
<div id="hint"></div>

<div id="charscreen" class="screen">
  <div class="cs-wrap">
    <h2>CHARACTER CREATION</h2>
    <div class="cs-progress" id="csProg"></div>
    <div id="csBody"></div>
    <div class="cs-nav">
      <button id="csBack">◀ BACK</button>
      <button id="csNext" class="primary">NEXT ▶</button>
    </div>
  </div>
</div>

<div id="inventory" class="screen">
  <div class="inv-wrap" id="invBody"></div>
</div>

<div id="deathscreen" class="screen">
  <h1>YOU DIED</h1>
  <div class="death-msg"></div>
  <div class="death-score"></div>
  <button onclick="location.reload()">TRY AGAIN</button>
</div>

<!-- Three.js r128 global build -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module" src="js/main.js"></script>

</body>
</html>
